<section class="create-todo container-fluid py-4 px-3 px-md-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="h3 mb-1">Create Todo</h1>
      <p class="text-secondary mb-0">Add a new task to your list.</p>
    </div>
    <a mat-stroked-button routerLink="/todo">Back</a>
  </div>

  <app-todo-form submitLabel="Create" (formSubmit)="onSubmit($event)" />
</section>

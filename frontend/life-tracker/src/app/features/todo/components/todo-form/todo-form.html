<form class="todo-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="row g-3">
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Title</mat-label>
        <input matInput formControlName="title" placeholder="What needs to be done?" />
        @if (form.controls.title.hasError('required')) {
          <mat-error>Title is required</mat-error>
        }
      </mat-form-field>
    </div>

    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Description</mat-label>
        <textarea matInput rows="4" formControlName="description" placeholder="Optional details"></textarea>
      </mat-form-field>
    </div>

    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Due date</mat-label>
        <input matInput type="date" formControlName="dueDate" />
        @if (form.controls.dueDate.hasError('required')) {
          <mat-error>Due date is required</mat-error>
        }
      </mat-form-field>
    </div>

    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Priority</mat-label>
        <mat-select formControlName="priority">
          @for (priority of priorities; track priority) {
            <mat-option [value]="priority">{{ priority }}</mat-option>
          }
        </mat-select>
      </mat-form-field>
    </div>
  </div>

  <div class="d-flex gap-2 mt-2">
    <button mat-flat-button color="primary" type="submit">{{ submitLabel }}</button>
  </div>
</form>
